<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現場作成 - 電子野帳</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="app-header">
    <div>
      <h1>📋 現場作成・編集</h1>
      <div class="header-sub" id="headerSub">新規現場を作成します</div>
    </div>
    <a href="../index.html"
       style="color:white;font-size:1.5rem;text-decoration:none;">✕</a>
  </header>

  <main class="main-content">

    <div class="form-section">
      <div class="form-section-title">📋 基本情報</div>
      <div class="form-group">
        <label>工事名 <span style="color:var(--danger)">*</span></label>
        <input type="text" id="siteName"
               placeholder="例：〇〇国道改良工事" maxlength="100">
      </div>
      <div class="form-group">
        <label>路線名</label>
        <input type="text" id="route"
               placeholder="例：〇〇線" maxlength="100">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>自（標石） <span style="color:var(--danger)">*</span></label>
          <input type="text" id="fromPoint"
                 placeholder="例：BM.1" maxlength="50">
        </div>
        <div class="form-group">
          <label>至（標石） <span style="color:var(--danger)">*</span></label>
          <input type="text" id="toPoint"
                 placeholder="例：BM.5" maxlength="50">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">📅 日時・環境</div>
      <div class="form-group">
        <label>日付 <span style="color:var(--danger)">*</span></label>
        <input type="date" id="siteDate">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>天候 <span style="color:var(--danger)">*</span></label>
          <select id="weather"></select>
        </div>
        <div class="form-group">
          <label>風</label>
          <select id="wind"></select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">🔧 機器・担当者</div>
      <div class="form-group">
        <label>器械 <span style="color:var(--danger)">*</span></label>
        <select id="instrument"></select>
      </div>
      <div class="form-group">
        <label>標尺 <span style="color:var(--danger)">*</span></label>
        <select id="staff"></select>
      </div>
      <div class="form-group">
        <label>観測者 <span style="color:var(--danger)">*</span></label>
        <select id="observer"></select>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">📐 測量等級</div>
      <div class="form-group">
        <label>等級 <span style="color:var(--danger)">*</span></label>
        <select id="grade">
          <option value="1級水準測量">1級水準測量（±2.5√S mm）</option>
          <option value="2級水準測量">2級水準測量（±5√S mm）</option>
          <option value="3級水準測量" selected>3級水準測量（±10√S mm）</option>
          <option value="4級水準測量">4級水準測量（±20√S mm）</option>
          <option value="簡易水準測量">簡易水準測量（±40√S mm）</option>
        </select>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">📏 基準高（BM高）</div>
      <div class="form-group">
        <label>出発点の既知高さ（m）
          <span style="color:var(--danger)">*</span>
        </label>
        <input type="number" id="bmHeight"
               placeholder="例：10.000"
               step="0.001" inputmode="decimal">
      </div>
    </div>

    <div id="errorMsg" class="alert alert-danger"
         style="display:none;"></div>

    <div class="form-row" style="margin-top:8px;">
      <a href="../index.html"
         class="btn btn-gray btn-full">キャンセル</a>
      <button class="btn btn-success btn-full btn-lg"
              id="saveBtn">
        保存して入力へ ›
      </button>
    </div>

  </main>

  <script src="../js/db.js"></script>
  <script>

  var editId = null;

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('siteDate').value =
      new Date().toISOString().split('T')[0];

    fillSelect('weather',    DB.getMaster('weather'));
    fillSelect('wind',       DB.getMaster('wind'));
    fillSelect('instrument', DB.getMaster('instruments'));
    fillSelect('staff',      DB.getMaster('staffs'));
    fillSelect('observer',   DB.getMaster('observers'));

    var params = new URLSearchParams(location.search);
    var id     = params.get('id');
    if (id) {
      var site = DB.getSite(id);
      if (site) loadSiteData(site);
    }

    document.getElementById('saveBtn')
      .addEventListener('click', saveSite);
  });

  function fillSelect(id, items) {
    var sel = document.getElementById(id);
    sel.innerHTML = items.map(function(i) {
      return '<option value="' + escapeHtml(i) + '">' +
             escapeHtml(i) + '</option>';
    }).join('');
  }

  function loadSiteData(site) {
    editId = site.id;
    document.getElementById('headerSub').textContent =
      '現場情報を編集します';
    document.getElementById('siteName').value   = site.name    || '';
    document.getElementById('route').value      = site.route   || '';
    document.getElementById('fromPoint').value  = site.from    || '';
    document.getElementById('toPoint').value    = site.to      || '';
    document.getElementById('siteDate').value   = site.date    || '';
    document.getElementById('weather').value    = site.weather || '';
    document.getElementById('wind').value       = site.wind    || '';
    document.getElementById('instrument').value = site.instrument || '';
    document.getElementById('staff').value      = site.staff   || '';
    document.getElementById('observer').value   = site.observer|| '';
    document.getElementById('grade').value      = site.grade   || '3級水準測量';
    document.getElementById('bmHeight').value   = site.bmHeight|| '';
  }

  function saveSite() {
    var name     = document.getElementById('siteName').value.trim();
    var from     = document.getElementById('fromPoint').value.trim();
    var to       = document.getElementById('toPoint').value.trim();
    var date     = document.getElementById('siteDate').value;
    var bmHeight = document.getElementById('bmHeight').value;
    var errorMsg = document.getElementById('errorMsg');

    if (!name) {
      showError('工事名を入力してください。'); return;
    }
    if (!from || !to) {
      showError('自・至（標石区間）を入力してください。'); return;
    }
    if (!date) {
      showError('日付を選択してください。'); return;
    }
    if (bmHeight === '' || isNaN(parseFloat(bmHeight))) {
      showError('基準高（BM高）を入力してください。'); return;
    }

    errorMsg.style.display = 'none';

    var site = {
      id:         editId,
      name:       name,
      route:      document.getElementById('route').value.trim(),
      from:       from,
      to:         to,
      date:       date,
      weather:    document.getElementById('weather').value,
      wind:       document.getElementById('wind').value,
      instrument: document.getElementById('instrument').value,
      staff:      document.getElementById('staff').value,
      observer:   document.getElementById('observer').value,
      grade:      document.getElementById('grade').value,
      bmHeight:   parseFloat(bmHeight),
    };

    var saved = DB.saveSite(site);
    location.href = 'input.html?id=' + saved.id;
  }

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent    = '⚠️ ' + msg;
    el.style.display  = 'flex';
    el.scrollIntoView({ behavior: 'smooth' });
  }

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  </script>

</body>
</html>
